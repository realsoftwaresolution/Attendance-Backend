<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"116-183-62-50-10264-stderr-1739272530733.txt","computername":"116-183-62-50","pid":10264,"type":"stderr","created":1739272530733},{"file":"116-183-62-50-12756-stderr-1739272465547.txt","computername":"116-183-62-50","pid":12756,"type":"stderr","created":1739272465547},{"file":"116-183-62-50-13532-stderr-1739273694842.txt","computername":"116-183-62-50","pid":13532,"type":"stderr","created":1739273694842},{"file":"116-183-62-50-13532-stdout-1739273694840.txt","computername":"116-183-62-50","pid":13532,"type":"stdout","created":1739273694840},{"file":"116-183-62-50-16452-stderr-1739272515764.txt","computername":"116-183-62-50","pid":16452,"type":"stderr","created":1739272515764},{"file":"116-183-62-50-8260-stderr-1739272455069.txt","computername":"116-183-62-50","pid":8260,"type":"stderr","created":1739272455069}];
        var lastUpdated = 1739273695944;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
