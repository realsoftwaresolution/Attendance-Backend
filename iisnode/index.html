<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"116-183-62-50-11292-stderr-1740564354782.txt","computername":"116-183-62-50","pid":11292,"type":"stderr","created":1740564354782},{"file":"116-183-62-50-11292-stdout-1740564354780.txt","computername":"116-183-62-50","pid":11292,"type":"stdout","created":1740564354780},{"file":"116-183-62-50-11408-stderr-1740552379594.txt","computername":"116-183-62-50","pid":11408,"type":"stderr","created":1740552379594},{"file":"116-183-62-50-11408-stdout-1740552379593.txt","computername":"116-183-62-50","pid":11408,"type":"stdout","created":1740552379593},{"file":"116-183-62-50-13140-stderr-1740559872191.txt","computername":"116-183-62-50","pid":13140,"type":"stderr","created":1740559872191},{"file":"116-183-62-50-13140-stdout-1740559872189.txt","computername":"116-183-62-50","pid":13140,"type":"stdout","created":1740559872189},{"file":"116-183-62-50-13412-stderr-1740567279010.txt","computername":"116-183-62-50","pid":13412,"type":"stderr","created":1740567279010},{"file":"116-183-62-50-13412-stdout-1740567279008.txt","computername":"116-183-62-50","pid":13412,"type":"stdout","created":1740567279008},{"file":"116-183-62-50-1452-stdout-1740544996129.txt","computername":"116-183-62-50","pid":1452,"type":"stdout","created":1740544996129},{"file":"116-183-62-50-17472-stderr-1740550732669.txt","computername":"116-183-62-50","pid":17472,"type":"stderr","created":1740550732669},{"file":"116-183-62-50-17472-stdout-1740550732668.txt","computername":"116-183-62-50","pid":17472,"type":"stdout","created":1740550732668},{"file":"116-183-62-50-19788-stderr-1740554138626.txt","computername":"116-183-62-50","pid":19788,"type":"stderr","created":1740554138626},{"file":"116-183-62-50-19788-stdout-1740554138624.txt","computername":"116-183-62-50","pid":19788,"type":"stdout","created":1740554138624},{"file":"116-183-62-50-6664-stderr-1740557431529.txt","computername":"116-183-62-50","pid":6664,"type":"stderr","created":1740557431529},{"file":"116-183-62-50-6664-stdout-1740557431527.txt","computername":"116-183-62-50","pid":6664,"type":"stdout","created":1740557431527}];
        var lastUpdated = 1740567280025;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
