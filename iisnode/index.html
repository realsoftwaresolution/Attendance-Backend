<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"116-183-62-50-12076-stderr-1744698979392.txt","computername":"116-183-62-50","pid":12076,"type":"stderr","created":1744698979392},{"file":"116-183-62-50-12076-stdout-1744698979390.txt","computername":"116-183-62-50","pid":12076,"type":"stdout","created":1744698979390},{"file":"116-183-62-50-12076-stdout-1744701647168.txt","computername":"116-183-62-50","pid":12076,"type":"stdout","created":1744701647168},{"file":"116-183-62-50-13972-stderr-1744698856618.txt","computername":"116-183-62-50","pid":13972,"type":"stderr","created":1744698856618},{"file":"116-183-62-50-13972-stdout-1744698856617.txt","computername":"116-183-62-50","pid":13972,"type":"stdout","created":1744698856617},{"file":"116-183-62-50-14760-stderr-1744697445004.txt","computername":"116-183-62-50","pid":14760,"type":"stderr","created":1744697445004},{"file":"116-183-62-50-14760-stdout-1744697445003.txt","computername":"116-183-62-50","pid":14760,"type":"stdout","created":1744697445003},{"file":"116-183-62-50-4676-stderr-1744698694149.txt","computername":"116-183-62-50","pid":4676,"type":"stderr","created":1744698694149},{"file":"116-183-62-50-4676-stdout-1744698694148.txt","computername":"116-183-62-50","pid":4676,"type":"stdout","created":1744698694148},{"file":"116-183-62-50-5048-stderr-1744698934970.txt","computername":"116-183-62-50","pid":5048,"type":"stderr","created":1744698934970},{"file":"116-183-62-50-5048-stdout-1744698934970.txt","computername":"116-183-62-50","pid":5048,"type":"stdout","created":1744698934970},{"file":"116-183-62-50-5116-stdout-1744696541468.txt","computername":"116-183-62-50","pid":5116,"type":"stdout","created":1744696541468}];
        var lastUpdated = 1744701647169;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
