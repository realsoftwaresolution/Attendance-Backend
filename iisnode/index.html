<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"116-183-62-50-15696-stderr-1742546999780.txt","computername":"116-183-62-50","pid":15696,"type":"stderr","created":1742546999780},{"file":"116-183-62-50-15696-stdout-1742546999780.txt","computername":"116-183-62-50","pid":15696,"type":"stdout","created":1742546999780},{"file":"116-183-62-50-15696-stdout-1742547897149.txt","computername":"116-183-62-50","pid":15696,"type":"stdout","created":1742547897149},{"file":"116-183-62-50-15696-stdout-1742549766804.txt","computername":"116-183-62-50","pid":15696,"type":"stdout","created":1742549766804},{"file":"116-183-62-50-2960-stdout-1742530007256.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742530007256},{"file":"116-183-62-50-2960-stdout-1742533279711.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742533279711},{"file":"116-183-62-50-2960-stdout-1742535086054.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742535086054},{"file":"116-183-62-50-2960-stdout-1742535646141.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742535646141},{"file":"116-183-62-50-2960-stdout-1742540086182.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742540086182},{"file":"116-183-62-50-2960-stdout-1742542318180.txt","computername":"116-183-62-50","pid":2960,"type":"stdout","created":1742542318180},{"file":"116-183-62-50-3580-stderr-1742544280147.txt","computername":"116-183-62-50","pid":3580,"type":"stderr","created":1742544280147},{"file":"116-183-62-50-3580-stdout-1742544280147.txt","computername":"116-183-62-50","pid":3580,"type":"stdout","created":1742544280147}];
        var lastUpdated = 1742549766819;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
